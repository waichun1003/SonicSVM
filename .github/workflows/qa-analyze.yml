name: QA Failure Analysis

on:
  workflow_run:
    workflows: ["Smoke Test", "Full Regression"]
    types: [completed]

permissions:
  actions: read
  pull-requests: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download test artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/
        continue-on-error: true

      - name: Find JUnit XML results
        id: find-results
        run: |
          mkdir -p results
          find artifacts/ -name "*.xml" -exec cp {} results/ \; 2>/dev/null || true
          if ls results/*.xml 1>/dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Found XML files:"
            ls -la results/*.xml
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No JUnit XML artifacts found"
          fi

      - name: Analyze from JUnit XML
        if: steps.find-results.outputs.found == 'true'
        id: xml-analysis
        run: |
          python scripts/analyze_results.py results/*.xml --findings FINDINGS.md > analysis.md
          cat analysis.md

      - name: Analyze from workflow logs (fallback)
        if: steps.find-results.outputs.found != 'true'
        id: log-analysis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          python scripts/analyze_logs.py > analysis.md
          cat analysis.md

      - name: Post to Job Summary
        if: always()
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          echo "## QA Failure Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** ${WORKFLOW_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** [#${RUN_ID}](${RUN_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f analysis.md ]; then
            cat analysis.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Analysis could not be produced. Check the [workflow run logs](${RUN_URL}) directly." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment on PR (if applicable)
        if: always() && hashFiles('analysis.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const headSha = '${{ github.event.workflow_run.head_sha }}';
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
            });

            if (prs.length === 0) {
              console.log('No open PR found for this branch -- skipping comment');
              return;
            }

            const prNumber = prs[0].number;
            let analysis = '';
            try {
              analysis = fs.readFileSync('analysis.md', 'utf8');
            } catch (e) {
              console.log('No analysis.md found');
              return;
            }

            const body = `### QA Failure Analysis\n\n` +
              `**Workflow:** ${{ github.event.workflow_run.name }}\n` +
              `**Run:** [#${{ github.event.workflow_run.id }}](${{ github.event.workflow_run.html_url }})\n\n` +
              analysis +
              `\n\n---\n*Posted automatically by [qa-analyze.yml](.github/workflows/qa-analyze.yml)*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body,
            });

            console.log(`Posted analysis comment on PR #${prNumber}`);
