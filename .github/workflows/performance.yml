name: Performance Tests

on:
  workflow_run:
    workflows: ["Full Regression"]
    types: [completed]
  schedule:
    - cron: "0 3 * * *"  # Daily at 3am UTC
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test,dev]"

      - name: Create results directory
        run: mkdir -p results

      - name: Run pytest performance benchmarks
        run: |
          pytest tests/performance/ -v \
            --timeout 300 \
            --reruns 2 --reruns-delay 5 \
            --junitxml=results/perf-benchmark.xml \
            --alluredir=allure-results/perf

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar xz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: |
          cp -f allure/environment.properties allure-results/ 2>/dev/null || true
          cp -f allure/categories.json allure-results/ 2>/dev/null || true
          cp -f allure/executor.json allure-results/ 2>/dev/null || true
          allure generate allure-results/perf -o allure-report-perf --clean

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-benchmark-results
          path: results/

      - name: Upload Allure performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-perf
          path: allure-report-perf/

  locust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test,load]"

      - name: Create results directory
        run: mkdir -p results

      - name: Locust load test (50 users, 120s)
        continue-on-error: true
        run: |
          locust -f src/smfs_qa/locustfile.py \
            --headless \
            --users 50 --spawn-rate 10 \
            --run-time 120s \
            --host https://interviews-api.sonic.game \
            --csv=results/locust \
            --html=results/locust-report.html \
            --print-stats --only-summary

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: results/
