name: Full Regression

on:
  workflow_run:
    workflows: ["Smoke Test"]
    types: [completed]
  schedule:
    - cron: "10 6 * * *"   # Daily 6:10am UTC (after morning smoke)
    - cron: "10 18 * * *"  # Daily 6:10pm UTC (after night smoke)
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test,dev]"

      - name: Create results directory
        run: mkdir -p results

      - name: Run REST API tests
        run: |
          pytest tests/rest/ -v \
            --reruns 3 --reruns-delay 2 \
            --timeout 60 \
            --junitxml=results/rest.xml \
            --alluredir=allure-results/rest

      - name: Run WebSocket tests
        run: |
          pytest tests/websocket/ -v \
            --reruns 3 --reruns-delay 2 \
            --timeout 120 \
            --junitxml=results/websocket.xml \
            --alluredir=allure-results/websocket

      - name: Run Solana stream tests
        run: |
          pytest tests/solana/ -v \
            --reruns 1 --reruns-delay 2 \
            --timeout 60 \
            --junitxml=results/solana.xml \
            --alluredir=allure-results/solana

      - name: Test summary
        if: always()
        run: |
          echo "## Regression Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in results/*.xml; do
            suite=$(basename "$f" .xml)
            tests=$(grep -o 'tests="[0-9]*"' "$f" 2>/dev/null | head -1 | grep -o '[0-9]*')
            fails=$(grep -o 'failures="[0-9]*"' "$f" 2>/dev/null | head -1 | grep -o '[0-9]*')
            echo "| $suite | ${tests:-0} tests | ${fails:-0} failures |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar xz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Generate Allure HTML report
        if: always()
        run: |
          cp -f allure/environment.properties allure-results/ 2>/dev/null || true
          cp -f allure/categories.json allure-results/ 2>/dev/null || true
          cp -f allure/executor.json allure-results/ 2>/dev/null || true
          allure generate \
            allure-results/rest \
            allure-results/websocket \
            allure-results/solana \
            -o allure-report --clean

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: results/

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
